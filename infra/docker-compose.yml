services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "zookeeper-shell localhost:2181 ls / > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/kafka/create-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_FILES_RAW: ${KAFKA_TOPIC_FILES_RAW:-files.raw}
      KAFKA_TOPIC_FILES_PROCESSED: ${KAFKA_TOPIC_FILES_PROCESSED:-files.processed}
      KAFKA_TOPIC_CDC_EVENTS: ${KAFKA_TOPIC_CDC_EVENTS:-cdc.events}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-dead-letter}
      KAFKA_PARTITIONS_FILES_RAW: ${KAFKA_PARTITIONS_FILES_RAW:-6}
      KAFKA_PARTITIONS_FILES_PROCESSED: ${KAFKA_PARTITIONS_FILES_PROCESSED:-6}
      KAFKA_PARTITIONS_CDC_EVENTS: ${KAFKA_PARTITIONS_CDC_EVENTS:-3}
      KAFKA_PARTITIONS_DLQ: ${KAFKA_PARTITIONS_DLQ:-1}
      KAFKA_RETENTION_FILES_RAW_MS: ${KAFKA_RETENTION_FILES_RAW_MS:-604800000}
      KAFKA_RETENTION_FILES_PROCESSED_MS: ${KAFKA_RETENTION_FILES_PROCESSED_MS:-2592000000}
      KAFKA_RETENTION_CDC_EVENTS_MS: ${KAFKA_RETENTION_CDC_EVENTS_MS:-604800000}
      KAFKA_RETENTION_DLQ_MS: ${KAFKA_RETENTION_DLQ_MS:-2592000000}
    volumes:
      - ./kafka:/kafka:ro
    restart: on-failure

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pipeline}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pipeline}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  postgres_data:
  minio_data:
